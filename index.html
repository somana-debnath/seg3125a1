<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Somana Debnath</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --pink: #f4a7c3; --purple: #c084d4; --light-pink: #fde8f2; --light-purple: #f0e0fa; --dark: #3a2040; --muted: #8a6a90; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; font-weight: 300; background: #fff; color: var(--dark); }

    nav { padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid var(--light-pink); }
    .logo { font-size: 1rem; color: var(--purple); font-weight: 600; text-decoration: none; letter-spacing: 0.01em; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { text-decoration: none; color: var(--muted); font-size: 0.88rem; font-weight: 600; transition: color 0.2s; }
    nav ul a:hover { color: var(--purple); }

    .hero {
      min-height: calc(100vh - 65px);
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--light-pink) 0%, var(--light-purple) 100%);
      text-align: center; padding: 3rem 2rem;
    }
    .hero-inner { max-width: 560px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1.15; margin-bottom: 1rem; color: var(--dark); }
    .hero h1 em { font-style: italic; color: var(--purple); }
    .hero p { font-size: 0.97rem; color: var(--muted); line-height: 1.8; margin-bottom: 2rem; max-width: 420px; margin-left: auto; margin-right: auto; }
    .btn-row { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
    .btn-pill { display: inline-block; padding: 0.6rem 1.5rem; background: var(--purple); color: #fff; border-radius: 999px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: background 0.2s, transform 0.15s; }
    .btn-pill:hover { background: var(--pink); color: var(--dark); transform: translateY(-2px); }
    .btn-pill.outline { background: transparent; border: 1.5px solid var(--purple); color: var(--purple); }
    .btn-pill.outline:hover { background: var(--light-purple); color: var(--dark); transform: translateY(-2px); }

    footer { background: var(--dark); color: #c8a8d8; text-align: center; padding: 2rem 1rem; font-size: 0.82rem; }
    footer a { color: var(--pink); text-decoration: none; margin: 0 0.4rem; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Somana Debnath</a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="process.html">Process</a></li>
      <li><a href="work.html">Work</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <h1>Hi, I am Somana.<br><em>Welcome to my digital workbook.</em></h1>
      <p>Computer engineering student at the University of Ottawa.</p>
      <div class="btn-row">
        <a href="about.html" class="btn-pill">About Me</a>
        <a href="work.html" class="btn-pill outline">See My Work</a>
      </div>
    </div>
  </section>

  <footer>
    <p>Somana Debnath &nbsp; <a href="mailto:somana.debnath@gmail.com">Email</a> <a href="https://linkedin.com/in/somana-debnath" target="_blank">LinkedIn</a> <a href="https://github.com/somana-debnath" target="_blank">GitHub</a></p>
  </footer>
</body>
</html>
